services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: maintops-web-vue-dev
    container_name: maintops-web-vue
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      FRONTEND_ALLOWED_HOSTS: ${FRONTEND_ALLOWED_HOSTS-}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_REALTIME_URL: ${VITE_REALTIME_URL:-http://localhost:3000}
      VITE_ANALYTICS_BASE_URL: ${VITE_ANALYTICS_BASE_URL:-http://localhost:8001}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  node_modules:
